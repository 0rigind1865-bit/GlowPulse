name: 每日回覆潛在客戶

# 每天台灣時間 21:00（UTC 13:00）掃描自己貼文的留言，自動回覆潛在客戶
# 需要帳號有 threads_manage_replies 或 threads_read_replies 權限才能讀取他人留言

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  engage:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 回覆潛在客戶留言
        run: npm run engage -- --yes
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
