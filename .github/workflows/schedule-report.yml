name: 每週成效報告

# 每週一台灣時間 09:00（UTC 01:00）產生上週發文成效週報
# AI 分析高低互動差異，自動更新 brand.ts / styles.ts，並將報告 commit 回 repo

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # 允許建立 branch 與 push
      pull-requests: write  # 允許建立 PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 產生週報並更新 data 層
        run: npm run report -- --yes
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN_REFRESHED_AT: ${{ secrets.THREADS_TOKEN_REFRESHED_AT }}

      - name: 建立 PR（週報 + data 層更新）
        run: |
          git config user.name  "GlowPulse Bot"
          git config user.email "bot@glowpulse.local"

          # 建立當日的 bot branch，避免直接推 main
          BRANCH="bot/weekly-report-$(date '+%Y-%m-%d')"

          # 若同名 branch 已存在（同天重跑），刪掉重建
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add docs/reports/ src/data/brand.ts src/data/styles.ts

          if git diff --staged --quiet; then
            echo "本週無發文數據或 AI 未產生變更，跳過建立 PR。"
            exit 0
          fi

          git commit -m "chore: 自動週報 $(date '+%Y-%m-%d')"
          git push origin "$BRANCH"

          # PR body 寫入暫存檔，避免多行字串在 shell 中的縮排問題
          cat > /tmp/pr_body.md << 'PREOF'
          ## AI 分析本週發文成效

          請確認以下修改後再 merge：

          - `docs/reports/` 本週報告
          - `src/data/brand.ts` 寫作技巧（如有更新）
          - `src/data/styles.ts` 發文風格（如有更新）

          > ⚠️ **請先看 Files changed tab 確認 AI 的建議符合品牌方向，再 merge。**
          > 特別注意 styles.ts — AI 有時會改寫原有風格指令，不只新增。

          🤖 由 GlowPulse Bot 自動建立
          PREOF

          gh pr create \
            --title "📊 週報更新 $(date '+%Y-%m-%d')" \
            --body-file /tmp/pr_body.md \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
